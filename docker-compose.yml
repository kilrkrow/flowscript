services:
  flowscript:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Required: set your LLM API key
      LLM_API_KEY:  ${LLM_API_KEY}
      # Optional overrides:
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL:    ${LLM_MODEL:-gpt-4o-mini}
      PORT:         3000
    restart: unless-stopped
